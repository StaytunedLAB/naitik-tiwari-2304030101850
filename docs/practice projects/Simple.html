<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple & Compound Interest</title>
</head>
<body>

    <h1>Simple & Compound Interest Calculator (Check Console)</h1>

    <!-- Link to external JavaScript file -->
    <script src="script.js">

        // Simple & Compound Interest

let p = 1000; // principal
let r = 5;    // rate
let t = 2;    // time in years

let simpleInterest = (p * r * t) / 100;
let compoundInterest = p * (Math.pow((1 + r / 100), t)) - p;

console.log("Simple Interest:", simpleInterest);
console.log("Compound Interest:", compoundInterest);

    </script>
</body>
</html>
