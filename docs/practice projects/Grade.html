<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Grade Calculator</title>
</head>
<body>

    <h1>Grade Calculator (Check Console)</h1>

    <script>
        // Grade Calculator Using Switch Case

let marks = 85;

switch (Math.floor(marks / 10)) {
    case 10:
    case 9:
        console.log("Grade: A");
        break;
    case 8:
        console.log("Grade: B");
        break;
    case 7:
        console.log("Grade: C");
        break;
    case 6:
        console.log("Grade: D");
        break;
    default:
        console.log("Grade: F");
}

    </script>
</body>
